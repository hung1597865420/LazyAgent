name: Feature request
description: Suggest an improvement for LazyAgent
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should LazyAgent do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime profiles
        - MCP tools
        - Lesson memory
        - Setup/install
        - Auto-Watch
        - Review/security
        - Documentation
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or competing tool you tried?
