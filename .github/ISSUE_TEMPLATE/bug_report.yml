name: Bug report
description: Report a reproducible LazyAgent bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands, profile, agent client, and relevant files.
      placeholder: |
        1. Set profile to ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: input
    id: profile
    attributes:
      label: Runtime profile
      placeholder: off / light / standard / balanced / review / heavy / max
  - type: input
    id: client
    attributes:
      label: Agent client
      placeholder: Claude Code / Codex / Gemini / Antigravity / other
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Redact API keys, cookies, private endpoints, and local user paths.
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets and private credentials from this report.
          required: true
